version: '3'
services:
  backend:
    build: ./server
    container_name: prodexa_backend
    ports:
      - "5000:5000"
    volumes:
      # Syncs your local ./server directory to /app in the container
      - ./server:/app
      # Prevents your local node_modules from overwriting the container's node_modules
      - /app/node_modules
    # Overrides the Dockerfile CMD to use nodemon for auto-restarts
    command: npx nodemon server.js
    environment:
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=development
    env_file:
      - ./server/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build: ./client
    container_name: prodexa_frontend
    ports:
      - "5173:5173"
    command: npm run dev
    volumes:
      # Syncs your frontend code for Vite's Hot Module Replacement
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    env_file:
      - ./client/.env